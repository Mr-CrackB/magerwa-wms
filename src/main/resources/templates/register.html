<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Magerwa WMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-container">
    <div class="login-brand">
        <h1>MAGERWA</h1>
        <div class="subtitle">Warehouse Management System</div>
        <div class="desc">
            Create your account to access<br>
            Rwanda's leading logistics platform
        </div>
        <div class="badge">🏭 EST. 1969 — KIGALI, RWANDA</div>
    </div>
    <div class="login-form">
        <div class="login-form-inner">
            <h2>Create Account</h2>
            <p class="sub">Fill in your details to request access</p>

            <p th:if="${error}" class="error-msg">⚠ <span th:text="${error}"></span></p>

            <div th:if="${success}" style="background:#F0FDF4; border:1px solid #BBF7D0; color:#15803D; padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:20px;">
                ✅ <span th:text="${success}"></span>
            </div>

            <form method="post" action="/register" th:unless="${success}">
                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" name="fullName" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>🔖 Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" name="email" placeholder="your@email.rw" required>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password" placeholder="Choose a password" required>
                </div>
                <div class="form-group">
                    <label>🎭 Role</label>
                    <select name="role" required>
                        <option value="CLIENT">Client</option>
                        <option value="STAFF">Warehouse Staff</option>
                        <option value="MANAGER">Warehouse Manager</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Request Account →</button>
            </form>

            <p class="hint" style="margin-top:16px;">
                Already have an account? <a href="/" style="color:#1A6FB5; font-weight:600;">Sign in here</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
