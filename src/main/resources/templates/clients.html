<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - Magerwa WMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2>MAGERWA WMS</h2>
            <div class="user-name" th:text="${user.fullName}">User</div>
            <div class="user-role" th:text="${user.role.displayName}">Role</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard"><span class="icon">📊</span> <span class="text">Dashboard</span></a>
            <a href="/inventory"><span class="icon">📦</span> <span class="text">Inventory</span></a>
            <a href="/orders"><span class="icon">📋</span> <span class="text">Orders</span></a>
            <a href="/clients" class="active"><span class="icon">👥</span> <span class="text">Clients</span></a>
            <a href="/reports"><span class="icon">📄</span> <span class="text">Reports</span></a>
            <a th:if="${user.role.name() == 'ADMIN' or user.role.name() == 'MANAGER'}" href="/users"><span class="icon">🔑</span> <span class="text">User Accounts</span></a>
        </nav>
        <div class="sidebar-logout"><a href="/logout"><span class="icon">🚪</span> <span class="text">Logout</span></a></div>
    </div>

    <div class="main-content">
        <h1 class="page-title">Client Management</h1>
        <p class="page-subtitle">Manage registered warehouse clients</p>

        <!-- Add Client Form -->
        <div class="form-card">
            <h3>+ Register New Client</h3>
            <form method="post" action="/clients/add">
                <div class="form-row">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" name="companyName" placeholder="Company name" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Person</label>
                        <input type="text" name="contactPerson" placeholder="Full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="email@company.rw" required>
                    </div>
                </div>
                <div class="form-row" style="margin-top:12px;">
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" placeholder="+250 7XX XXX XXX" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" name="address" placeholder="City, Rwanda" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-teal">Register Client</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Clients Table -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Client ID</th><th>Company</th><th>Contact Person</th>
                        <th>Email</th><th>Phone</th><th>Address</th><th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.clientId}"></td>
                        <td th:text="${client.companyName}"></td>
                        <td th:text="${client.contactPerson}"></td>
                        <td th:text="${client.email}"></td>
                        <td th:text="${client.phone}"></td>
                        <td th:text="${client.address}"></td>
                        <td>
                            <a th:href="@{'/clients/delete/' + ${client.clientId}}" class="btn btn-red btn-sm"
                               onclick="return confirm('Delete this client?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
